name: 'freeflake'
version: '1.0.0'
config-version: 2

profile: 'freeflake'

model-paths: ["models"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

# Silver and gold layers are written back to DATA_DIR as Parquet (external),
# so the warehouse stays on the file share while DuckDB itself runs locally.
models:
  freeflake:
    silver:
      +materialized: external
    gold:
      +materialized: external

# Hand-maintained reference data loaded into the local DuckDB file (not the
# share). Month columns use ISO-date headers, so quote_columns keeps the
# generated DDL valid.
seeds:
  freeflake:
    +quote_columns: true
